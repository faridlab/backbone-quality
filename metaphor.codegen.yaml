# Codegen policy for quality.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs, lib.rs)
# and are preserved by the marker mechanism, not listed here.
#
# Add your hand-authored services, handlers, tests, and docs below as you write them.

user_owned:
  - "src/application/service/quality_events.rs"
  - "src/application/service/quality_write_service.rs"
  # Own the hand-written quality SQL (the template + criteria definition, the inspection verdict's
  # header/readings inserts, the CAPA lifecycle's locked reads and gated transitions) that the write
  # service orchestrates. Declared here — not renamed with a `_custom` suffix — so the generator skips
  # them wholesale; this declaration is what makes editing them legitimate.
  - "src/infrastructure/persistence/non_conformance_repository.rs"
  - "src/infrastructure/persistence/quality_action_repository.rs"
  - "src/infrastructure/persistence/quality_inspection_parameter_repository.rs"
  - "src/infrastructure/persistence/quality_inspection_reading_repository.rs"
  - "src/infrastructure/persistence/quality_inspection_repository.rs"
  - "src/infrastructure/persistence/quality_inspection_template_repository.rs"
  - "src/infrastructure/persistence/quality_procedure_repository.rs"
  - "tests/integrity_probes.rs"
  - "tests/quality_golden_cases.rs"
  - "tests/quality_inspection_seam.rs"
  - "scripts/**"
  - "tests/inspection_outbox_durability.rs"
  # Hand-authored behavior (services + their HTTP surface). Examples:
  # - "src/application/service/onboarding_service.rs"
  # - "src/presentation/http/guarded_routes.rs"

  # Behavior tests (the golden cases / oracle) + BDD features.
  - "tests/features/**"
  # - "tests/*_golden_cases.rs"
  # - "tests/integrity_probes.rs"

  # Hand-authored module documentation.
  - "docs/**"

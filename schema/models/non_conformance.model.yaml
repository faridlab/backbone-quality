# =============================================================================
# Domain: Quality
# Entity: NonConformance
# Description: A recorded quality failure — raised from a rejected inspection or an audit. It gathers one
# or more corrective/preventive actions (QualityAction / CAPA) and closes only when its actions are
# resolved. Logical links to the triggering inspection + item. Posts NO GL.
# =============================================================================

models:
  - name: NonConformance
    collection: non_conformances
    description: "A quality failure gathering corrective/preventive actions (CAPA)"
    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique NC id"
      company_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Org owner # logical FK to organization.Company.id"
      subject:
        type: string
        attributes: ["@required", "@max(200)"]
        description: "What went wrong (short)"
      source_inspection_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "The rejected inspection that raised it (if any) # logical FK to QualityInspection.id"
      item_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "Item involved # logical FK to catalog.Product.id"
      severity:
        type: NonConformanceSeverity
        attributes: ["@required", "@default(medium)"]
        description: "How serious"
      status:
        type: NonConformanceStatus
        attributes: ["@required", "@default(open)"]
        description: "open → in_progress → closed"
      description:
        type: string?
        attributes: ["@max(4000)"]
        description: "Detail"
      opened_at:
        type: datetime
        attributes: ["@required"]
        description: "When it was raised"
      closed_at:
        type: datetime?
        description: "When it was closed"
      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata"
    indexes:
      - type: index
        fields: [company_id, status]
      - type: index
        fields: [source_inspection_id]

enums:
  - name: NonConformanceSeverity
    description: "Non-conformance severity"
    variants:
      - name: low
        description: "Low"
      - name: medium
        description: "Medium"
        default: true
      - name: high
        description: "High"
      - name: critical
        description: "Critical"

  - name: NonConformanceStatus
    description: "Non-conformance lifecycle"
    variants:
      - name: open
        description: "Raised, no action yet"
        default: true
      - name: in_progress
        description: "Actions under way"
      - name: closed
        description: "Resolved"

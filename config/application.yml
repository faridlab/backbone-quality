server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/quality.log
module:
  name: quality
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: false
entities:
  non_conformance:
    collection: non_conformances
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  quality_action:
    collection: quality_actions
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  quality_inspection:
    collection: quality_inspections
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  quality_inspection_reading:
    collection: quality_inspection_readings
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  quality_inspection_template:
    collection: quality_inspection_templates
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  quality_inspection_parameter:
    collection: quality_inspection_parameters
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  quality_procedure:
    collection: quality_procedures
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
